<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Precedent Researcher · Summer AI Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Precedent Researcher <span class="sub">/ dossier builder</span></h1>
      <p class="tagline">
        Polish is not evidence. Every claim is tagged; every precedent is attacked;
        the facts are yours to verify.
      </p>
    </header>

    <main>
      <form id="form">
        <label class="field">
          <span>Research prompt</span>
          <textarea
            id="topic"
            rows="2"
            placeholder="e.g. naturally ventilated libraries in hot-humid climates"
          ></textarea>
        </label>

        <div class="row">
          <label class="field small">
            <span>Precedents</span>
            <input id="count" type="number" min="1" max="8" value="4" />
          </label>

          <label class="toggle">
            <input id="grounded" type="checkbox" />
            <span>Ground with web search</span>
            <small>Off = model-only (you verify). On = real citations.</small>
          </label>

          <button id="run" type="submit">Build dossier</button>
        </div>
      </form>

      <div id="status" class="status" hidden></div>
      <div id="error" class="error" hidden></div>

      <section id="results" hidden>
        <div class="toolbar">
          <button id="dl-md" type="button">Download Markdown</button>
          <button id="dl-json" type="button">Download JSON</button>
        </div>
        <div id="restatement" class="restatement"></div>
        <div id="matrix-wrap"></div>
        <div id="cards"></div>
        <div id="adversarial"></div>
        <div id="gaps"></div>
        <div id="worksheet"></div>
        <div id="provenance"></div>
      </section>
    </main>

    <footer>
      Summer AI Studio · AI is a material to be interrogated, never a second brain.
    </footer>

    <script src="app.js"></script>
  </body>
</html>
