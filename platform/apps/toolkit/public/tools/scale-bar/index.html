<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scale Bar &amp; North</title>
<!--
  Scale Bar & North — make a correct graphic scale bar and a north arrow for a
  drawing sheet. Pick a scale (metric ratio or imperial architect's scale), set
  the length and divisions, and export an SVG sized in real millimetres (so it
  prints true at 100%) or a PNG. Pure SVG, nothing uploaded.

  Part of the All Means Works design toolkit (2D Tooling).
-->
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#f5f5f3; --surface:#fff; --line:#e4e4e0; --ink:#111; --accent:#ff3b21; }
html, body { height: 100%; }
body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--ink); display: flex; flex-direction: column; overflow: hidden; }
header { padding: 10px 18px; background: var(--surface); border-bottom: 2px solid var(--ink);
  display: flex; align-items: baseline; gap: 14px; flex-shrink: 0; }
header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; text-transform: uppercase; }
header .subtitle { font-size: 12px; }
.app { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.sidebar { width: 300px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--line);
  overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.group { display: flex; flex-direction: column; gap: 9px; }
.group > .label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--line); padding-bottom: 5px; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.row label { font-size: 13px; }
.row .val { font-size: 12px; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
input[type="range"] { width: 100%; accent-color: var(--accent); }
input[type="number"], select { width: 100%; font: inherit; font-size: 13px; padding: 7px 8px;
  border: 1px solid var(--line); border-radius: 6px; color: var(--ink); background: #fff; }
input[type="color"] { width: 36px; height: 28px; border: 1px solid var(--line); border-radius: 6px; padding: 0; background: #fff; }
.seg { display: flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
.seg button { flex: 1; font: inherit; font-size: 12px; font-weight: 600; padding: 7px 4px;
  background: #fff; border: 0; border-right: 1px solid var(--line); cursor: pointer; color: var(--ink); }
.seg button:last-child { border-right: 0; }
.seg button.on { background: var(--ink); color: #fff; }
.check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
.check input { accent-color: var(--accent); width: 15px; height: 15px; }
.btn { font: inherit; font-size: 13px; font-weight: 700; padding: 9px 12px; border-radius: 6px;
  border: 1px solid var(--ink); background: #fff; color: var(--ink); cursor: pointer; text-align: center; }
.btn:hover { background: #f0f0ee; }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.hint { font-size: 11px; line-height: 1.45; }
.stage { position: relative; flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; padding: 28px;
  background: #f7f7f5; }
#wrap { background: #fff; box-shadow: 0 2px 18px rgba(0,0,0,0.12); padding: 28px 34px; }
.note { position: absolute; bottom: 12px; left: 12px; font-size: 12px; background: rgba(255,255,255,0.9);
  border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; }
</style>
</head>
<body>
<header>
  <h1>Scale&nbsp;Bar&nbsp;&amp;&nbsp;North</h1>
  <span class="subtitle">A correct graphic scale bar + north arrow for your sheet</span>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="group">
      <div class="label">Scale</div>
      <div class="seg" id="sys">
        <button data-s="metric">Metric</button>
        <button data-s="imperial" class="on">Imperial</button>
      </div>
      <select id="scale"></select>
      <div class="hint" id="ratioHint"></div>
    </div>

    <div class="group">
      <div class="label">Bar</div>
      <div class="row"><label>Units / division</label><span class="val" id="perV"></span></div>
      <input type="range" id="per" min="1" max="100" value="10">
      <div class="row"><label>Divisions</label><span class="val" id="ndivV">4</span></div>
      <input type="range" id="ndiv" min="2" max="10" value="4">
      <div class="row"><label>Fine sub-divisions</label><span class="val" id="subV">10</span></div>
      <input type="range" id="sub" min="0" max="20" value="10">
      <div class="row"><label>Bar height</label><span class="val" id="hV">3 mm</span></div>
      <input type="range" id="h" min="1" max="8" value="3">
      <div class="row"><label>Drawn length</label><span class="val" id="drawnV"></span></div>
    </div>

    <div class="group">
      <div class="label">North arrow</div>
      <label class="check"><input type="checkbox" id="north" checked> Include north arrow</label>
      <div class="seg" id="northStyle">
        <button data-n="simple" class="on">Simple</button>
        <button data-n="needle">Needle</button>
        <button data-n="star">Star</button>
      </div>
      <div class="row"><label>Rotation</label><span class="val" id="rotV">0°</span></div>
      <input type="range" id="rot" min="0" max="359" value="0">
    </div>

    <div class="group">
      <div class="label">Bar style</div>
      <select id="barStyle">
        <option value="alternating">Alternating (filled blocks)</option>
        <option value="open">Open boxes (outline + ticks)</option>
        <option value="stepped">Stepped (castellated)</option>
        <option value="ruler">Ruler (baseline + ticks)</option>
        <option value="solid">Solid bar</option>
        <option value="wavy">Wavy (scalloped lead)</option>
      </select>
      <div class="hint" id="styleHint"></div>
    </div>

    <div class="group">
      <div class="label">Style</div>
      <div class="row"><label>Ink</label><input type="color" id="ink" value="#111111"></div>
      <div class="hint">The bar is drawn at real millimetres for the chosen scale — export and place it at 100% on your sheet and it reads true.</div>
    </div>

    <div class="group">
      <div class="label">Export</div>
      <div class="two">
        <button class="btn accent" id="svgBtn">SVG</button>
        <button class="btn" id="pngBtn">PNG</button>
      </div>
    </div>
  </aside>

  <div class="stage">
    <div id="wrap"><svg id="art" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div class="note" id="note"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const SVGNS = "http://www.w3.org/2000/svg";

// Scale tables. ratio = real / drawn. Metric: the number itself. Imperial: precomputed.
const METRIC = [10,20,50,100,200,250,500,1000,1250,2500].map(r => ({ label: "1 : " + r, ratio: r }));
const IMPERIAL = [
  ['3" = 1\'-0"', 12/3], ['1½" = 1\'-0"', 12/1.5], ['1" = 1\'-0"', 12], ['¾" = 1\'-0"', 12/0.75],
  ['½" = 1\'-0"', 24], ['¼" = 1\'-0"', 48], ['⅛" = 1\'-0"', 96], ['1" = 10\'', 120],
  ['1" = 20\'', 240], ['1" = 30\'', 360], ['1" = 40\'', 480], ['1" = 50\'', 600], ['1" = 100\'', 1200]
].map(([label, ratio]) => ({ label, ratio }));

const S = {
  sys: "imperial", scaleIdx: 5, per: 10, ndiv: 4, sub: 10, h: 3,
  north: true, northStyle: "simple", rot: 0, ink: "#111111", barStyle: "alternating"
};

const STYLE_HINTS = {
  alternating: "Solid filled blocks alternating dark / light — the classic architectural scale.",
  open: "Outlined boxes with a tick at every division — clean for line drawings.",
  stepped: "Castellated square-wave profile; raised teeth mark alternating divisions.",
  ruler: "A baseline with downward ticks — full-height at divisions, short at sub-divisions.",
  solid: "One solid bar; divisions are read from the ticks and labels above.",
  wavy: "Scalloped half-circle arcs over the sub-divided lead, then a plain line."
};
const table = () => S.sys === "metric" ? METRIC : IMPERIAL;
const ratio = () => table()[S.scaleIdx].ratio;
const unit = () => S.sys === "metric" ? "m" : "ft";
const realMMperUnit = () => S.sys === "metric" ? 1000 : 304.8; // m or ft → mm

function fillScaleSelect() {
  const sel = $("scale"); sel.innerHTML = "";
  table().forEach((s, i) => { const o = document.createElement("option"); o.value = i; o.textContent = s.label; sel.appendChild(o); });
  if (S.scaleIdx >= table().length) S.scaleIdx = S.sys === "metric" ? 3 : 5;
  sel.value = S.scaleIdx;
}

const f = n => Math.round(n * 100) / 100;
const niceNum = n => (Math.round(n * 1000) / 1000).toString();

// north arrow as an SVG group, height ~ Hmm, centred at (cx, baseY going up)
function northSVG(cx, topY, sizeMM, ink) {
  const r = sizeMM / 2, rot = S.rot;
  let g = `<g transform="rotate(${rot} ${f(cx)} ${f(topY + r)})" fill="${ink}" stroke="${ink}">`;
  if (S.northStyle === "needle") {
    g += `<polygon points="${f(cx)},${f(topY)} ${f(cx - r*0.32)},${f(topY + sizeMM)} ${f(cx)},${f(topY + sizeMM*0.78)} ${f(cx + r*0.32)},${f(topY + sizeMM)}" />`;
  } else if (S.northStyle === "star") {
    const cy = topY + r; let pts = "";
    for (let k = 0; k < 8; k++) { const a = -Math.PI/2 + k * Math.PI/4; const rr = k % 2 ? r*0.32 : r; pts += `${f(cx + rr*Math.cos(a))},${f(cy + rr*Math.sin(a))} `; }
    g += `<polygon points="${pts.trim()}" />`;
  } else { // simple half-filled triangle
    g += `<polygon points="${f(cx)},${f(topY)} ${f(cx - r*0.5)},${f(topY + sizeMM)} ${f(cx)},${f(topY + sizeMM*0.7)}" fill="${ink}"/>`;
    g += `<polygon points="${f(cx)},${f(topY)} ${f(cx + r*0.5)},${f(topY + sizeMM)} ${f(cx)},${f(topY + sizeMM*0.7)}" fill="#fff" stroke="${ink}" stroke-width="0.4"/>`;
  }
  g += `</g>`;
  // upright "N" label above the arrow tip (label does not rotate)
  g += `<text x="${f(cx)}" y="${f(topY - sizeMM*0.18)}" font-family="sans-serif" font-size="${f(sizeMM*0.45)}" font-weight="700" text-anchor="middle" fill="${ink}">N</text>`;
  return g;
}

// Build the full SVG (in mm). pad = margin in mm.
function buildSVG() {
  const r = ratio(), ink = S.ink;
  const drawnPerDiv = (S.per * realMMperUnit()) / r;   // mm on paper per division
  const Lmm = drawnPerDiv * S.ndiv;                    // main bar drawn length (mm)
  const barH = S.h;
  const ext = drawnPerDiv;                             // sub-divided extension to the left of 0
  const totalW = Lmm + ext;
  const fontMM = Math.max(2, barH * 0.95);
  const tickUp = barH * 1.1;
  const pad = Math.max(6, fontMM * 1.4);
  const northH = S.north ? Math.max(10, barH * 4) : 0;
  const northGap = S.north ? fontMM * 2 : 0;

  const W = totalW + pad * 2;
  const H = pad * 2 + barH + tickUp + fontMM * 1.4 + (S.north ? northH + northGap : 0);
  const x0 = pad + ext;          // x of "0"
  const topNorth = pad;
  const barY = pad + (S.north ? northH + northGap : 0);

  let b = `<rect x="0" y="0" width="${f(W)}" height="${f(H)}" fill="#ffffff"/>`;

  if (S.north) b += northSVG(W / 2, topNorth, northH, ink);

  // segments: extension (sub parts) then ndiv main divisions, alternating fill
  const segs = [];
  if (S.sub > 0) for (let k = 0; k < S.sub; k++) segs.push({ x: pad + (ext * k / S.sub), w: ext / S.sub, fillIdx: k });
  else segs.push({ x: pad, w: ext, fillIdx: 0 });
  for (let k = 0; k < S.ndiv; k++) segs.push({ x: x0 + drawnPerDiv * k, w: drawnPerDiv, fillIdx: (S.sub > 0 ? S.sub : 1) + k });

  const sw = 0.3, barB = barY + barH;
  if (S.barStyle === "open") {
    // outlined boxes: outline + a tick at every division boundary
    b += `<rect x="${f(pad)}" y="${f(barY)}" width="${f(totalW)}" height="${f(barH)}" fill="none" stroke="${ink}" stroke-width="${sw}"/>`;
    for (const s of segs) b += `<line x1="${f(s.x)}" y1="${f(barY)}" x2="${f(s.x)}" y2="${f(barB)}" stroke="${ink}" stroke-width="${sw}"/>`;
    b += `<line x1="${f(pad + totalW)}" y1="${f(barY)}" x2="${f(pad + totalW)}" y2="${f(barB)}" stroke="${ink}" stroke-width="${sw}"/>`;
  } else if (S.barStyle === "stepped") {
    // castellated square wave — raised teeth on even (filled-index) segments
    let d = `M ${f(pad)} ${f(barB)}`;
    for (const s of segs) { const y = s.fillIdx % 2 === 0 ? barY : barB; d += ` L ${f(s.x)} ${f(y)} L ${f(s.x + s.w)} ${f(y)}`; }
    d += ` L ${f(pad + totalW)} ${f(barB)} Z`;
    b += `<path d="${d}" fill="none" stroke="${ink}" stroke-width="${sw}"/>`;
  } else if (S.barStyle === "ruler") {
    // baseline with downward ticks: short at sub-divisions, full-height at main divisions
    b += `<line x1="${f(pad)}" y1="${f(barB)}" x2="${f(pad + totalW)}" y2="${f(barB)}" stroke="${ink}" stroke-width="${sw}"/>`;
    for (const s of segs) b += `<line x1="${f(s.x)}" y1="${f(barY + barH * 0.45)}" x2="${f(s.x)}" y2="${f(barB)}" stroke="${ink}" stroke-width="${sw}"/>`;
    for (let k = 0; k <= S.ndiv; k++) { const x = x0 + drawnPerDiv * k; b += `<line x1="${f(x)}" y1="${f(barY)}" x2="${f(x)}" y2="${f(barB)}" stroke="${ink}" stroke-width="${sw}"/>`; }
  } else if (S.barStyle === "solid") {
    // one solid bar; divisions read from the ticks + labels above
    b += `<rect x="${f(pad)}" y="${f(barY)}" width="${f(totalW)}" height="${f(barH)}" fill="${ink}"/>`;
  } else if (S.barStyle === "wavy") {
    // scalloped arcs over the sub-divided lead, then a plain baseline
    let d = `M ${f(pad)} ${f(barB)}`;
    if (S.sub > 0) { const w = ext / S.sub; for (let k = 0; k < S.sub; k++) d += ` a ${f(w / 2)} ${f(barH)} 0 0 1 ${f(w)} 0`; }
    else d += ` L ${f(x0)} ${f(barB)}`;
    d += ` L ${f(pad + totalW)} ${f(barB)}`;
    b += `<path d="${d}" fill="none" stroke="${ink}" stroke-width="${sw}"/>`;
  } else {
    // alternating (default): solid filled blocks, dark / light
    b += `<rect x="${f(pad)}" y="${f(barY)}" width="${f(totalW)}" height="${f(barH)}" fill="none" stroke="${ink}" stroke-width="${sw}"/>`;
    for (const s of segs) if (s.fillIdx % 2 === 0) b += `<rect x="${f(s.x)}" y="${f(barY)}" width="${f(s.w)}" height="${f(barH)}" fill="${ink}"/>`;
  }

  // labels: ticks + values at each main boundary (0 .. per*ndiv), and the extension value on the far left
  const lblY = barY - barH * 0.5;
  const tk = (x) => `<line x1="${f(x)}" y1="${f(barY - tickUp)}" x2="${f(x)}" y2="${f(barY)}" stroke="${ink}" stroke-width="0.3"/>`;
  const txt = (x, t) => `<text x="${f(x)}" y="${f(barY - tickUp - fontMM*0.3)}" font-family="sans-serif" font-size="${f(fontMM)}" text-anchor="middle" fill="${ink}">${t}</text>`;
  b += tk(pad) + txt(pad, niceNum(S.per));            // far-left extension value
  for (let k = 0; k <= S.ndiv; k++) { const x = x0 + drawnPerDiv * k; b += tk(x) + txt(x, niceNum(S.per * k)); }
  // units label at the right end (below the bar)
  b += `<text x="${f(pad + totalW)}" y="${f(barY + barH + fontMM*1.3)}" font-family="sans-serif" font-size="${f(fontMM)}" text-anchor="end" fill="${ink}">${unit()}</text>`;
  // scale caption at left below
  b += `<text x="${f(pad)}" y="${f(barY + barH + fontMM*1.3)}" font-family="sans-serif" font-size="${f(fontMM)}" font-weight="700" fill="${ink}">${table()[S.scaleIdx].label}</text>`;

  return { svg: `<svg xmlns="${SVGNS}" width="${f(W)}mm" height="${f(H)}mm" viewBox="0 0 ${f(W)} ${f(H)}">${b}</svg>`, W, H, Lmm, drawnPerDiv };
}

function render() {
  const { svg, W, Lmm } = buildSVG();
  // show on screen scaled up so small print sizes are visible
  const art = $("art");
  const stage = document.querySelector(".stage");
  const maxW = stage.clientWidth - 120, maxH = stage.clientHeight - 120;
  // parse viewBox H from svg
  const m = svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/); const vbW = +m[1], vbH = +m[2];
  const sc = Math.min(maxW / vbW, maxH / vbH, 6);
  art.outerHTML = svg.replace("<svg ", `<svg id="art" width="${f(vbW*sc)}" height="${f(vbH*sc)}" `).replace(/width="[\d.]+mm" height="[\d.]+mm" /, "");
  $("drawnV").textContent = f(Lmm) + " mm";
  $("note").textContent = `Scale ${table()[S.scaleIdx].label} · bar = ${niceNum(S.per*S.ndiv)} ${unit()} drawn at ${f(Lmm)} mm`;
}
function curSVG() { return buildSVG().svg; }

function dl(blob, name) { const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
$("svgBtn").onclick = () => dl(new Blob([curSVG()], { type: "image/svg+xml" }), "scale-bar.svg");
$("pngBtn").onclick = () => {
  const svg = curSVG(), m = svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/), vbW = +m[1], vbH = +m[2];
  const img = new Image(); const url = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
  img.onload = () => { const k = Math.max(4, 1200 / vbW); const cv = document.createElement("canvas");
    cv.width = Math.round(vbW*k); cv.height = Math.round(vbH*k); const g = cv.getContext("2d");
    g.fillStyle = "#fff"; g.fillRect(0,0,cv.width,cv.height); g.drawImage(img, 0, 0, cv.width, cv.height);
    cv.toBlob(b => dl(b, "scale-bar.png"), "image/png"); URL.revokeObjectURL(url); };
  img.src = url;
};

// ── wiring ───────────────────────────────────────────────────────────────
function setRatioHint() { $("ratioHint").textContent = "Ratio 1 : " + niceNum(ratio()) + " — " + niceNum(S.per) + " " + unit() + " = " + f((S.per*realMMperUnit())/ratio()) + " mm on paper."; }
$("sys").querySelectorAll("button").forEach(b => {
  b.onclick = () => { S.sys = b.dataset.s; $("sys").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
    S.scaleIdx = S.sys === "metric" ? 3 : 5; S.per = S.sys === "metric" ? 5 : 10; $("per").value = S.per;
    fillScaleSelect(); $("perV").textContent = S.per + " " + unit(); setRatioHint(); render(); };
});
$("scale").onchange = e => { S.scaleIdx = +e.target.value; setRatioHint(); render(); };
$("per").oninput = e => { S.per = +e.target.value; $("perV").textContent = S.per + " " + unit(); setRatioHint(); render(); };
$("ndiv").oninput = e => { S.ndiv = +e.target.value; $("ndivV").textContent = S.ndiv; render(); };
$("sub").oninput = e => { S.sub = +e.target.value; $("subV").textContent = S.sub; render(); };
$("h").oninput = e => { S.h = +e.target.value; $("hV").textContent = S.h + " mm"; render(); };
$("north").onchange = e => { S.north = e.target.checked; render(); };
$("northStyle").querySelectorAll("button").forEach(b => { b.onclick = () => { S.northStyle = b.dataset.n;
  $("northStyle").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b)); render(); }; });
$("rot").oninput = e => { S.rot = +e.target.value; $("rotV").textContent = S.rot + "°"; render(); };
$("ink").oninput = e => { S.ink = e.target.value; render(); };
$("barStyle").onchange = e => { S.barStyle = e.target.value; $("styleHint").textContent = STYLE_HINTS[S.barStyle]; render(); };
addEventListener("resize", render);

fillScaleSelect(); $("perV").textContent = S.per + " " + unit(); $("hV").textContent = S.h + " mm"; setRatioHint();
$("barStyle").value = S.barStyle; $("styleHint").textContent = STYLE_HINTS[S.barStyle];
render();
</script>
</body>
</html>
