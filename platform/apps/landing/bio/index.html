<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bio — All Means Works</title>
  <meta name="description" content="John Clark — designer and educator, School of Architecture, University of Illinois Urbana-Champaign." />
  <meta property="og:title" content="All Means Bio — John Clark" />
  <meta property="og:url" content="https://allmeans.works/bio" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0a0a0a; --bg: #fff; --accent: #ff3b21;
      --display: "Archivo Black", ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--display);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1rem, 4vw, 2.5rem);
    }
    .back {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(.8rem, 2.4vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: .03em;
      color: var(--ink);
      text-decoration: none;
    }
    .back:hover, .back:focus-visible { color: var(--accent); outline: none; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; }

    /* Main text = ~80% of the viewport, fluid: scales up/down with the window
       and on any device. */
    .bio {
      width: 80vw;
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(1.5rem, 5.4vw, 6rem);
      line-height: 1.05;
      letter-spacing: -.015em;
    }
    /* Emphasis via italics, not colour — keep body text black (site rule). */
    .bio em { font-style: italic; color: var(--ink); }
    .bio a { color: var(--accent); text-decoration: none; white-space: nowrap; }
    .bio a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back" href="../">← All Means Works</a>
  <main>
    <p class="bio">
      John Clark is a designer and educator — Teaching Assistant Professor in the School of
      Architecture at the University of Illinois Urbana-Champaign. His work asks how tools and
      workflows shape <em>who can participate in design.</em> <a href="../works/">Works&nbsp;→</a>
    </p>
  </main>
  <!-- Vercel Web Analytics — anonymous, cookie-free pageviews. Loads only on Vercel. -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
