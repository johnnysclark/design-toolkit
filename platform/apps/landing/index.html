<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All Means Works</title>
  <meta name="description" content="All Means Works — John Clark. Tools and works." />
  <meta property="og:title" content="All Means Works" />
  <meta property="og:url" content="https://allmeans.works/" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #0a0a0a; --bg: #fff; --accent: #ff3b21; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Archivo Black", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vh 4vw;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(.1rem, 1.5vh, 1rem);
      text-align: center;
      width: 100%;
    }
    /* Big punchy choices — fluid, fill the screen, scale on any device. */
    .choice {
      font-size: clamp(3.5rem, 18vw, 13rem);
      line-height: .9;
      letter-spacing: -.02em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      display: block;
      transition: color .12s ease;
    }
    .choice:hover, .choice:focus-visible { color: var(--accent); outline: none; }
    /* The one other text on the page. */
    .bio-link {
      margin-top: clamp(1.25rem, 5vh, 3.5rem);
      font-size: clamp(1.05rem, 5vw, 2.6rem);
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      transition: color .12s ease;
    }
    .bio-link:hover, .bio-link:focus-visible { color: var(--accent); outline: none; }
  </style>
</head>
<body>
  <main>
    <a class="choice" href="https://toolkit.allmeans.works">Tools</a>
    <a class="choice" href="works/">Works</a>
    <a class="bio-link" href="bio/">All Means Bio</a>
  </main>
  <!-- Vercel Web Analytics — anonymous, cookie-free pageviews. Loads only on Vercel. -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
